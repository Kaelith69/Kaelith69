<svg width="720" height="100" viewBox="0 0 720 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="line-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2AA198" stop-opacity="0"/>
      <stop offset="30%" stop-color="#2AA198" stop-opacity="1"/>
      <stop offset="70%" stop-color="#6FB7FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6FB7FF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="720" height="100" fill="#0F1724" rx="10"/>
  <rect width="720" height="100" fill="none" stroke="#16202a" stroke-width="1" rx="10"/>

  <!-- Accent bar left -->
  <rect x="20" y="22" width="3" height="56" fill="#2AA198" rx="2" opacity="0.95"/>

  <!-- Tag label -->
  <text x="36" y="39" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="10" fill="#2AA198" opacity="0.8" letter-spacing="2">IDENTITY.JSON</text>

  <!-- Name line -->
  <text x="36" y="62" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="22" font-weight="700" fill="#F7F6F2" letter-spacing="2">Kaelith69</text>
  <text x="180" y="62" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="11" fill="#6FB7FF" opacity="0.8"> // @github</text>

  <!-- Bottom tag line -->
  <text x="36" y="80" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="12" fill="#A3ADB8">
    <tspan fill="#2AA198" font-weight="600">role:</tspan> cs student  
    <tspan fill="#2AA198" font-weight="600">  loc:</tspan> malabar, kerala 🌿  
    <tspan fill="#2AA198" font-weight="600">  status:</tspan> debugging...
    <animate attributeName="opacity" values="1;0.7;1" dur="2.4s" repeatCount="indefinite"/>
  </text>

  <!-- Right side - bracket decoration -->
  <text x="660" y="55" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="40" fill="#16202a" font-weight="700">{}</text>

  <!-- Divider line -->
  <rect x="20" y="88" width="680" height="1" fill="url(#line-grad)" opacity="0.4"/>
</svg>
