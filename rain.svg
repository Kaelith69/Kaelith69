<svg width="720" height="160" viewBox="0 0 720 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .rain-char { font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; font-size: 14px; fill: #2AA198; opacity: 0; }
      .rain-char-bright { font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; font-size: 14px; fill: #6FB7FF; font-weight: 600; }
      .title { font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; }
    </style>
    <linearGradient id="fadeBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="60%" stop-color="#0F1724" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0F1724" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="fadeTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F1724" stop-opacity="1"/>
      <stop offset="25%" stop-color="#0F1724" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-blue">
      <feGaussianBlur stdDeviation="1.0" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="160" fill="#0F1724" rx="12"/>

  <!-- Matrix rain columns - col 0 -->
  <g opacity="0.5">
    <text class="rain-char" x="10" y="20">ア</text><text class="rain-char" x="10" y="36">ウ</text><text class="rain-char" x="10" y="52">カ</text><text class="rain-char" x="10" y="68">サ</text><text class="rain-char" x="10" y="84">タ</text><text class="rain-char" x="10" y="100">ナ</text><text class="rain-char" x="10" y="116">ハ</text><text class="rain-char" x="10" y="132">マ</text><text class="rain-char" x="10" y="148">ヤ</text>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,160" dur="3s" repeatCount="indefinite" begin="-1.2s"/>
    <animate attributeName="opacity" values="0;0.7;0.5;0.3;0" dur="3s" repeatCount="indefinite" begin="-1.2s"/>
  </g>
  <g opacity="0.4">
    <text class="rain-char" x="30" y="10">ラ</text><text class="rain-char" x="30" y="26">ワ</text><text class="rain-char" x="30" y="42">1</text><text class="rain-char" x="30" y="58">0</text><text class="rain-char" x="30" y="74">ン</text><text class="rain-char" x="30" y="90">チ</text><text class="rain-char" x="30" y="106">リ</text><text class="rain-char" x="30" y="122">ル</text>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,160" dur="2.4s" repeatCount="indefinite" begin="-0.6s"/>
    <animate attributeName="opacity" values="0;0.6;0.4;0.2;0" dur="2.4s" repeatCount="indefinite" begin="-0.6s"/>
  </g>
  <g opacity="0.5">
    <text class="rain-char" x="50" y="30">ヲ</text><text class="rain-char" x="50" y="46">ア</text><text class="rain-char" x="50" y="62">8</text><text class="rain-char" x="50" y="78">コ</text><text class="rain-char" x="50" y="94">ソ</text><text class="rain-char" x="50" y="110">ト</text><text class="rain-char" x="50" y="126">ノ</text><text class="rain-char" x="50" y="142">ホ</text>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,160" dur="2.7s" repeatCount="indefinite" begin="-2.1s"/>
    <animate attributeName="opacity" values="0;0.7;0.5;0.2;0" dur="2.7s" repeatCount="indefinite" begin="-2.1s"/>
  </g>
  <g opacity="0.35">
    <text class="rain-char" x="660" y="15">モ</text><text class="rain-char" x="660" y="31">ヨ</text><text class="rain-char" x="660" y="47">ロ</text><text class="rain-char" x="660" y="63">ヲ</text><text class="rain-char" x="660" y="79">ア</text><text class="rain-char" x="660" y="95">6</text><text class="rain-char" x="660" y="111">9</text><text class="rain-char" x="660" y="127">ン</text>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,160" dur="3.1s" repeatCount="indefinite" begin="-1.8s"/>
    <animate attributeName="opacity" values="0;0.6;0.4;0.1;0" dur="3.1s" repeatCount="indefinite" begin="-1.8s"/>
  </g>
  <g opacity="0.4">
    <text class="rain-char" x="685" y="25">フ</text><text class="rain-char" x="685" y="41">ム</text><text class="rain-char" x="685" y="57">ユ</text><text class="rain-char" x="685" y="73">ル</text><text class="rain-char" x="685" y="89">レ</text><text class="rain-char" x="685" y="105">0</text><text class="rain-char" x="685" y="121">1</text><text class="rain-char" x="685" y="137">ス</text>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,160" dur="2.5s" repeatCount="indefinite" begin="-0.9s"/>
    <animate attributeName="opacity" values="0;0.5;0.4;0.2;0" dur="2.5s" repeatCount="indefinite" begin="-0.9s"/>
  </g>
  <g opacity="0.3">
    <text class="rain-char" x="700" y="10">ク</text><text class="rain-char" x="700" y="26">ツ</text><text class="rain-char" x="700" y="42">ヌ</text><text class="rain-char" x="700" y="58">フ</text><text class="rain-char" x="700" y="74">ム</text><text class="rain-char" x="700" y="90">ユ</text><text class="rain-char" x="700" y="106">ル</text><text class="rain-char" x="700" y="122">レ</text>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,160" dur="3.3s" repeatCount="indefinite" begin="-2.4s"/>
    <animate attributeName="opacity" values="0;0.5;0.3;0.1;0" dur="3.3s" repeatCount="indefinite" begin="-2.4s"/>
  </g>

  <!-- Fade overlays -->
  <rect width="720" height="160" fill="url(#fadeTop)" rx="12"/>
  <rect width="720" height="160" fill="url(#fadeBottom)" rx="12"/>

  <!-- Center glow backdrop -->
  <ellipse cx="360" cy="80" rx="260" ry="55" fill="#0F1724" opacity="0.85"/>

  <!-- Name -->
  <text x="360" y="62" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="34" font-weight="700"
    fill="#6FB7FF" text-anchor="middle" filter="url(#glow-blue)" letter-spacing="8">
    k a e l i t h
    <animate attributeName="opacity" values="1;0.8;1" dur="3.2s" repeatCount="indefinite"/>
  </text>

  <!-- Subtitle line -->
  <text x="360" y="90" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="13"
    fill="#A3ADB8" text-anchor="middle" filter="url(#glow)" letter-spacing="3" opacity="0.9">
    cs student · malabar · developer &amp; digital artist
  </text>

  <!-- Blinking cursor -->
  <rect x="536" y="78" width="9" height="2" fill="#2AA198" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="0.8s" repeatCount="indefinite"/>
  </rect>

  <!-- Bottom scan line effect -->
  <rect x="0" y="0" width="720" height="2" fill="#2AA198" opacity="0.06">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,160" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- Border -->
  <rect width="720" height="160" fill="none" stroke="#16202a" stroke-width="1" rx="12"/>
  <rect x="1" y="1" width="718" height="158" fill="none" stroke="#2AA198" stroke-width="0.5" rx="11" opacity="0.22"/>
</svg>
