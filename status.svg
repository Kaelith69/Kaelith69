<svg width="348" height="210" viewBox="0 0 348 210" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="0.8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2AA198"/>
      <stop offset="100%" stop-color="#E6B800"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E07A5F"/>
      <stop offset="100%" stop-color="#E6B800"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6FB7FF"/>
      <stop offset="100%" stop-color="#9AD0D6"/>
    </linearGradient>
  </defs>

  <rect width="348" height="210" fill="#0F1724" rx="10"/>
  <rect width="348" height="210" fill="none" stroke="#16202a" stroke-width="1" rx="10"/>

  <!-- Header -->
  <rect x="0" y="0" width="348" height="36" fill="#0d1622" rx="10"/>
  <rect x="0" y="26" width="348" height="10" fill="#0d1622"/>
  <rect width="348" height="1" fill="none"/>
  <circle cx="20" cy="18" r="5" fill="#E07A5F"/>
  <circle cx="36" cy="18" r="5" fill="#E6B800"/>
  <circle cx="52" cy="18" r="5" fill="#2AA198"/>
  <text x="174" y="23" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="11" fill="#A3ADB8" text-anchor="middle" letter-spacing="2">STATUS.SH</text>

  <!-- Status items -->
  <!-- 1: Mood -->
  <text x="18" y="60" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="10" fill="#A3ADB8">MOOD</text>
  <text x="18" y="78" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="13" fill="#F7F6F2">☕ caffeinated</text>
  <rect x="18" y="84" width="200" height="3" fill="#16202a" rx="2"/>
  <rect x="18" y="84" width="160" height="3" fill="url(#bar1)" rx="2">
    <animate attributeName="width" from="0" to="160" dur="1.1s" fill="freeze" begin="0.2s"/>
  </rect>

  <!-- 2: Focus -->
  <text x="18" y="108" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="10" fill="#A3ADB8">FOCUS</text>
  <text x="18" y="126" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="13" fill="#F7F6F2">🧠 building stuff</text>
  <rect x="18" y="132" width="200" height="3" fill="#16202a" rx="2"/>
  <rect x="18" y="132" width="185" height="3" fill="url(#bar2)" rx="2">
    <animate attributeName="width" from="0" to="185" dur="1.1s" fill="freeze" begin="0.35s"/>
  </rect>

  <!-- 3: Sleep -->
  <text x="18" y="156" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="10" fill="#A3ADB8">SLEEP</text>
  <text x="18" y="174" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="13" fill="#F7F6F2">🌙 who needs sleep</text>
  <rect x="18" y="180" width="200" height="3" fill="#16202a" rx="2"/>
  <rect x="18" y="180" width="90" height="3" fill="url(#bar3)" rx="2">
    <animate attributeName="width" from="0" to="90" dur="1.1s" fill="freeze" begin="0.5s"/>
  </rect>

  <!-- Blinking online dot -->
  <circle cx="322" cy="53" r="5" fill="#2AA198" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.35;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="314" y="70" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="9" fill="#2AA198" text-anchor="middle">ONLINE</text>

  <!-- Bottom border accent -->
  <rect x="18" y="197" width="312" height="1" fill="#16202a" rx="1"/>
  <rect x="18" y="197" width="80" height="1" fill="#2AA198" rx="1" opacity="0.6">
    <animate attributeName="width" values="0;312;0" dur="3.2s" repeatCount="indefinite"/>
  </rect>
</svg>
