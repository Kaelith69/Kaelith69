<svg width="348" height="210" viewBox="0 0 348 210" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f78166"/>
      <stop offset="100%" stop-color="#ffa657"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d2a8ff"/>
      <stop offset="100%" stop-color="#79c0ff"/>
    </linearGradient>
  </defs>

  <rect width="348" height="210" fill="#0d1117" rx="10"/>
  <rect width="348" height="210" fill="none" stroke="#21262d" stroke-width="1" rx="10"/>

  <!-- Header -->
  <rect x="0" y="0" width="348" height="36" fill="#161b22" rx="10"/>
  <rect x="0" y="26" width="348" height="10" fill="#161b22"/>
  <rect width="348" height="1" fill="none"/>
  <circle cx="20" cy="18" r="5" fill="#f78166"/>
  <circle cx="36" cy="18" r="5" fill="#ffa657"/>
  <circle cx="52" cy="18" r="5" fill="#3fb950"/>
  <text x="174" y="23" font-family="'Courier New',monospace" font-size="11" fill="#8b949e" text-anchor="middle" letter-spacing="2">STATUS.SH</text>

  <!-- Status items -->
  <!-- 1: Mood -->
  <text x="18" y="60" font-family="'Courier New',monospace" font-size="10" fill="#8b949e">MOOD</text>
  <text x="18" y="78" font-family="'Courier New',monospace" font-size="13" fill="#e6edf3">☕ caffeinated</text>
  <rect x="18" y="84" width="200" height="3" fill="#21262d" rx="2"/>
  <rect x="18" y="84" width="160" height="3" fill="url(#bar1)" rx="2">
    <animate attributeName="width" from="0" to="160" dur="1.5s" fill="freeze" begin="0.3s"/>
  </rect>

  <!-- 2: Focus -->
  <text x="18" y="108" font-family="'Courier New',monospace" font-size="10" fill="#8b949e">FOCUS</text>
  <text x="18" y="126" font-family="'Courier New',monospace" font-size="13" fill="#e6edf3">🧠 building stuff</text>
  <rect x="18" y="132" width="200" height="3" fill="#21262d" rx="2"/>
  <rect x="18" y="132" width="185" height="3" fill="url(#bar2)" rx="2">
    <animate attributeName="width" from="0" to="185" dur="1.5s" fill="freeze" begin="0.5s"/>
  </rect>

  <!-- 3: Sleep -->
  <text x="18" y="156" font-family="'Courier New',monospace" font-size="10" fill="#8b949e">SLEEP</text>
  <text x="18" y="174" font-family="'Courier New',monospace" font-size="13" fill="#e6edf3">🌙 who needs sleep</text>
  <rect x="18" y="180" width="200" height="3" fill="#21262d" rx="2"/>
  <rect x="18" y="180" width="90" height="3" fill="url(#bar3)" rx="2">
    <animate attributeName="width" from="0" to="90" dur="1.5s" fill="freeze" begin="0.7s"/>
  </rect>

  <!-- Blinking online dot -->
  <circle cx="322" cy="53" r="5" fill="#3fb950" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="314" y="70" font-family="'Courier New',monospace" font-size="9" fill="#3fb950" text-anchor="middle">ONLINE</text>

  <!-- Bottom border accent -->
  <rect x="18" y="197" width="312" height="1" fill="#21262d" rx="1"/>
  <rect x="18" y="197" width="80" height="1" fill="#3fb950" rx="1" opacity="0.6">
    <animate attributeName="width" values="0;312;0" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
