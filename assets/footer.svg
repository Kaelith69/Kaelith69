<svg width="860" height="80" viewBox="0 0 860 80" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Profile footer">
  <defs>
    <linearGradient id="footer-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0d10"/>
      <stop offset="100%" stop-color="#12161b"/>
    </linearGradient>
  </defs>
  <rect width="860" height="80" rx="16" fill="url(#footer-bg)"/>
  <rect x="1" y="1" width="858" height="78" rx="15" stroke="#20262d"/>

  <!-- Subtle background particles -->
  <g opacity="0.2">
    <circle cx="120" cy="60" r="1.5" fill="#7a8fa6">
      <animate attributeName="cy" values="60;10;60" dur="13s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="13s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="70" r="2" fill="#d7c3a3">
      <animate attributeName="cy" values="70;20;70" dur="18s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="18s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="50" r="1.5" fill="#66708a">
      <animate attributeName="cy" values="50;10;50" dur="16s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="16s" repeatCount="indefinite"/>
    </circle>
    <circle cx="280" cy="65" r="1" fill="#b89f7a">
      <animate attributeName="cy" values="65;15;65" dur="21s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="21s" repeatCount="indefinite"/>
    </circle>
    <circle cx="620" cy="40" r="2" fill="#7a8fa6">
      <animate attributeName="cy" values="40;70;40" dur="23s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="23s" repeatCount="indefinite"/>
    </circle>
  </g>

  <line x1="90" y1="40" x2="150" y2="40" stroke="#2a313a"/>
  <line x1="710" y1="40" x2="770" y2="40" stroke="#2a313a"/>
  <circle cx="150" cy="40" r="2" fill="#d7c3a3"/>
  <circle cx="710" cy="40" r="2" fill="#d7c3a3"/>

  <text x="430" y="46" text-anchor="middle" font-family="'Tiro Devanagari Sanskrit', 'Nirmala UI', 'Mangal', 'Cormorant Garamond', 'Libre Baskerville', 'Georgia', serif" font-size="24" fill="#e8e4dc">अहं ब्रह्मास्मि</text>
</svg>
