<svg width="720" height="160" viewBox="0 0 720 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="py-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="js-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="cpp-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <linearGradient id="html-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fdba74"/>
    </linearGradient>
    <linearGradient id="other-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
  </defs>

  <rect width="720" height="160" fill="#0a0f1f" rx="10"/>
  <rect width="720" height="160" fill="none" stroke="#21262d" stroke-width="1" rx="10"/>

  <!-- Header -->
  <rect x="0" y="0" width="720" height="36" fill="#11172a" rx="10"/>
  <rect x="0" y="26" width="720" height="10" fill="#11172a"/>
  <circle cx="20" cy="18" r="5" fill="#f78166"/>
  <circle cx="36" cy="18" r="5" fill="#ffa657"/>
  <circle cx="52" cy="18" r="5" fill="#3fb950"/>
  <text x="360" y="23" font-family="'Courier New',monospace" font-size="11" fill="#8b949e" text-anchor="middle" letter-spacing="2">WEEKLY CODING ACTIVITY · WAKATIME</text>
  <!-- Total hours badge -->
  <rect x="616" y="8" width="90" height="20" fill="#21262d" rx="4"/>
  <text x="661" y="22" font-family="'Courier New',monospace" font-size="10" fill="#3fb950" text-anchor="middle">⏱ 34h 12m</text>

  <!-- Python -->
  <text x="20" y="61" font-family="'Courier New',monospace" font-size="12" fill="#60a5fa">Python</text>
  <rect x="100" y="50" width="500" height="14" fill="#21262d" rx="3"/>
  <rect x="100" y="50" width="355" height="14" fill="url(#py-bar)" rx="3">
    <animate attributeName="width" from="0" to="355" dur="1.2s" fill="freeze" begin="0.2s"/>
  </rect>
  <text x="614" y="62" font-family="'Courier New',monospace" font-size="11" fill="#8b949e">42.3%</text>
  <text x="685" y="62" font-family="'Courier New',monospace" font-size="11" fill="#60a5fa">14h 27m</text>

  <!-- JavaScript -->
  <text x="20" y="88" font-family="'Courier New',monospace" font-size="12" fill="#fcd34d">JavaScript</text>
  <rect x="100" y="77" width="500" height="14" fill="#21262d" rx="3"/>
  <rect x="100" y="77" width="235" height="14" fill="url(#js-bar)" rx="3">
    <animate attributeName="width" from="0" to="235" dur="1.2s" fill="freeze" begin="0.4s"/>
  </rect>
  <text x="614" y="89" font-family="'Courier New',monospace" font-size="11" fill="#8b949e">28.1%</text>
  <text x="685" y="89" font-family="'Courier New',monospace" font-size="11" fill="#fcd34d">9h 36m</text>

  <!-- C++ -->
  <text x="20" y="115" font-family="'Courier New',monospace" font-size="12" fill="#c4b5fd">C++</text>
  <rect x="100" y="104" width="500" height="14" fill="#21262d" rx="3"/>
  <rect x="100" y="104" width="150" height="14" fill="url(#cpp-bar)" rx="3">
    <animate attributeName="width" from="0" to="150" dur="1.2s" fill="freeze" begin="0.6s"/>
  </rect>
  <text x="614" y="116" font-family="'Courier New',monospace" font-size="11" fill="#8b949e">17.9%</text>
  <text x="685" y="116" font-family="'Courier New',monospace" font-size="11" fill="#c4b5fd">6h 7m</text>

  <!-- HTML/CSS -->
  <text x="20" y="142" font-family="'Courier New',monospace" font-size="12" fill="#fb923c">HTML/CSS</text>
  <rect x="100" y="131" width="500" height="14" fill="#21262d" rx="3"/>
  <rect x="100" y="131" width="80" height="14" fill="url(#html-bar)" rx="3">
    <animate attributeName="width" from="0" to="80" dur="1.2s" fill="freeze" begin="0.8s"/>
  </rect>
  <text x="614" y="143" font-family="'Courier New',monospace" font-size="11" fill="#8b949e">9.5%</text>
  <text x="685" y="143" font-family="'Courier New',monospace" font-size="11" fill="#fb923c">3h 14m</text>

  <!-- Other (small bar) -->
  <text x="20" y="157" font-family="'Courier New',monospace" font-size="9" fill="#8b949e">other</text>
  <rect x="100" y="152" width="500" height="5" fill="#21262d" rx="2"/>
  <rect x="100" y="152" width="28" height="5" fill="url(#other-bar)" rx="2">
    <animate attributeName="width" from="0" to="28" dur="1.2s" fill="freeze" begin="1s"/>
  </rect>
</svg>
