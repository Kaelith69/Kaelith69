<svg width="720" height="160" viewBox="0 0 720 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="py-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6FB7FF"/>
      <stop offset="100%" stop-color="#9AD0D6"/>
    </linearGradient>
    <linearGradient id="js-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E6B800"/>
      <stop offset="100%" stop-color="#FFD86B"/>
    </linearGradient>
    <linearGradient id="cpp-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9E86FF"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>
    <linearGradient id="html-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E07A5F"/>
      <stop offset="100%" stop-color="#F6B29A"/>
    </linearGradient>
    <linearGradient id="other-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2AA198"/>
      <stop offset="100%" stop-color="#9AE0CA"/>
    </linearGradient>
  </defs>

  <rect width="720" height="160" fill="#0F1724" rx="10"/>
  <rect width="720" height="160" fill="none" stroke="#16202a" stroke-width="1" rx="10"/>

  <!-- Header -->
  <rect x="0" y="0" width="720" height="36" fill="#0d1622" rx="10"/>
  <rect x="0" y="26" width="720" height="10" fill="#0d1622"/>
  <circle cx="20" cy="18" r="5" fill="#E07A5F"/>
  <circle cx="36" cy="18" r="5" fill="#E6B800"/>
  <circle cx="52" cy="18" r="5" fill="#2AA198"/>
  <text x="360" y="23" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="11" fill="#A3ADB8" text-anchor="middle" letter-spacing="2">WEEKLY CODING ACTIVITY · WAKATIME</text>
  <!-- Total hours badge -->
  <rect x="616" y="8" width="90" height="20" fill="#16202a" rx="4"/>
  <text x="661" y="22" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="10" fill="#2AA198" text-anchor="middle">⏱ 34h 12m</text>

  <!-- Python -->
  <text x="20" y="61" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="12" fill="#6FB7FF">Python</text>
  <rect x="100" y="50" width="500" height="14" fill="#16202a" rx="3"/>
  <rect x="100" y="50" width="355" height="14" fill="url(#py-bar)" rx="3">
    <animate attributeName="width" from="0" to="355" dur="0.9s" fill="freeze" begin="0.15s"/>
  </rect>
  <text x="614" y="62" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="11" fill="#A3ADB8">42.3%</text>
  <text x="685" y="62" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="11" fill="#6FB7FF">14h 27m</text>

  <!-- JavaScript -->
  <text x="20" y="88" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="12" fill="#E6B800">JavaScript</text>
  <rect x="100" y="77" width="500" height="14" fill="#16202a" rx="3"/>
  <rect x="100" y="77" width="235" height="14" fill="url(#js-bar)" rx="3">
    <animate attributeName="width" from="0" to="235" dur="0.9s" fill="freeze" begin="0.3s"/>
  </rect>
  <text x="614" y="89" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="11" fill="#A3ADB8">28.1%</text>
  <text x="685" y="89" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="11" fill="#E6B800">9h 36m</text>

  <!-- C++ -->
  <text x="20" y="115" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="12" fill="#9E86FF">C++</text>
  <rect x="100" y="104" width="500" height="14" fill="#16202a" rx="3"/>
  <rect x="100" y="104" width="150" height="14" fill="url(#cpp-bar)" rx="3">
    <animate attributeName="width" from="0" to="150" dur="0.9s" fill="freeze" begin="0.45s"/>
  </rect>
  <text x="614" y="116" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="11" fill="#A3ADB8">17.9%</text>
  <text x="685" y="116" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="11" fill="#9E86FF">6h 7m</text>

  <!-- HTML/CSS -->
  <text x="20" y="142" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="12" fill="#E07A5F">HTML/CSS</text>
  <rect x="100" y="131" width="500" height="14" fill="#16202a" rx="3"/>
  <rect x="100" y="131" width="80" height="14" fill="url(#html-bar)" rx="3">
    <animate attributeName="width" from="0" to="80" dur="0.9s" fill="freeze" begin="0.6s"/>
  </rect>
  <text x="614" y="143" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="11" fill="#A3ADB8">9.5%</text>
  <text x="685" y="143" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="11" fill="#E07A5F">3h 14m</text>

  <!-- Other (small bar) -->
  <text x="20" y="157" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="9" fill="#A3ADB8">other</text>
  <rect x="100" y="152" width="500" height="5" fill="#16202a" rx="2"/>
  <rect x="100" y="152" width="28" height="5" fill="url(#other-bar)" rx="2">
    <animate attributeName="width" from="0" to="28" dur="0.9s" fill="freeze" begin="0.75s"/>
  </rect>
</svg>
