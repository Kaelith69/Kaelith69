<svg width="720" height="170" viewBox="0 0 720 170" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="1.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="red-glow"><feGaussianBlur stdDeviation="1.0" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="4" height="4">
      <rect width="4" height="1" fill="#F7F6F2" opacity="0.12"/>
    </pattern>
  </defs>

  <rect width="720" height="170" fill="#0F1724" rx="10"/>
  <rect width="720" height="170" fill="none" stroke="#16202a" stroke-width="1" rx="10"/>

  <!-- Terminal header - error style -->
  <rect x="0" y="0" width="720" height="34" fill="#2d1111" rx="10"/>
  <rect x="0" y="24" width="720" height="10" fill="#2d1111"/>
  <circle cx="20" cy="17" r="5" fill="#E07A5F"/>
  <circle cx="36" cy="17" r="5" fill="#E6B800"/>
  <circle cx="52" cy="17" r="5" fill="#2AA198"/>
  <text x="360" y="22" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="11" fill="#E07A5F" text-anchor="middle" letter-spacing="2">EXISTENTIAL_CRISIS.EXE — STDERR</text>
  <!-- Blinking error -->
  <text x="690" y="22" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="10" fill="#E07A5F" text-anchor="end" font-weight="600" filter="url(#red-glow)">
    ● RUN
    <animate attributeName="opacity" values="1;0.4;1" dur="1.6s" repeatCount="indefinite"/>
  </text>

  <!-- Terminal lines -->
  <text x="20" y="58" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="12" fill="#2AA198">Kaelith69@malabar:~$</text>
  <text x="175" y="58" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="12" fill="#F7F6F2"> ./think --deep</text>

  <text x="20" y="78" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="12" fill="#E07A5F">[ERROR]</text>
  <text x="82" y="78" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="12" fill="#A3ADB8"> existential overflow detected at line 69</text>

  <text x="20" y="96" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="12" fill="#E6B800">[WARN]</text>
  <text x="80" y="96" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="12" fill="#A3ADB8">  meaning_of_life = null // still searching</text>

  <!-- NieR quote -->
  <text x="20" y="120" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="12" fill="#6FB7FF" filter="url(#glow)">
    &gt; "Everything that lives is designed to end."
  </text>
  <text x="20" y="138" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="11" fill="#A3ADB8">
    &gt;  — NieR: Automata
  </text>

  <text x="20" y="156" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="12" fill="#2AA198">
    &gt; my bugs didn't get the memo. <tspan fill="#E6B800">still running.</tspan>
  </text>

  <!-- Cursor -->
  <rect x="390" y="144" width="8" height="14" fill="#2AA198">
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
  </rect>

  <!-- Scanline decorative effect -->
  <rect width="720" height="170" fill="url(#scanlines)" rx="10" opacity="0.03"/>
</svg>
