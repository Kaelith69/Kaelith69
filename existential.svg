<svg width="720" height="170" viewBox="0 0 720 170" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="red-glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="4" height="4">
      <rect width="4" height="1" fill="#ffffff" opacity="0.4"/>
    </pattern>
  </defs>

  <rect width="720" height="170" fill="#0a0f1f" rx="10"/>
  <rect width="720" height="170" fill="none" stroke="#21262d" stroke-width="1" rx="10"/>

  <!-- Terminal header - error style -->
  <rect x="0" y="0" width="720" height="34" fill="#1a0a0a" rx="10"/>
  <rect x="0" y="24" width="720" height="10" fill="#1a0a0a"/>
  <circle cx="20" cy="17" r="5" fill="#f78166"/>
  <circle cx="36" cy="17" r="5" fill="#ffa657"/>
  <circle cx="52" cy="17" r="5" fill="#3fb950"/>
  <text x="360" y="22" font-family="'Courier New',monospace" font-size="11" fill="#f78166" text-anchor="middle" letter-spacing="2">EXISTENTIAL_CRISIS.EXE — STDERR</text>
  <!-- Blinking error -->
  <text x="690" y="22" font-family="'Courier New',monospace" font-size="10" fill="#f78166" text-anchor="end" filter="url(#red-glow)">
    ● RUN
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </text>

  <!-- Terminal lines -->
  <text x="20" y="58" font-family="'Courier New',monospace" font-size="12" fill="#3fb950">Kaelith69@malabar:~$</text>
  <text x="175" y="58" font-family="'Courier New',monospace" font-size="12" fill="#e6edf3"> ./think --deep</text>

  <text x="20" y="78" font-family="'Courier New',monospace" font-size="12" fill="#f78166">[ERROR]</text>
  <text x="82" y="78" font-family="'Courier New',monospace" font-size="12" fill="#8b949e"> existential overflow detected at line 69</text>

  <text x="20" y="96" font-family="'Courier New',monospace" font-size="12" fill="#ffa657">[WARN]</text>
  <text x="80" y="96" font-family="'Courier New',monospace" font-size="12" fill="#8b949e">  meaning_of_life = null // still searching</text>

  <!-- NieR quote -->
  <text x="20" y="120" font-family="'Courier New',monospace" font-size="12" fill="#58a6ff" filter="url(#glow)">
    &gt; "Everything that lives is designed to end."
  </text>
  <text x="20" y="138" font-family="'Courier New',monospace" font-size="11" fill="#30363d">
    &gt;  — NieR: Automata
  </text>

  <text x="20" y="156" font-family="'Courier New',monospace" font-size="12" fill="#3fb950">
    &gt; my bugs didn't get the memo. <tspan fill="#ffa657">still running.</tspan>
  </text>

  <!-- Cursor -->
  <rect x="390" y="144" width="8" height="14" fill="#3fb950">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Scanline decorative effect -->
  <rect width="720" height="170" fill="url(#scanlines)" rx="10" opacity="0.03"/>
</svg>
