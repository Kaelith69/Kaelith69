<svg width="720" height="110" viewBox="0 0 720 110" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="divider" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3fb950" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3fb950" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="720" height="110" fill="#0d1117" rx="10"/>
  <rect width="720" height="110" fill="none" stroke="#21262d" stroke-width="1" rx="10"/>

  <!-- Left: Clock widget -->
  <rect x="12" y="12" width="220" height="86" fill="#161b22" rx="8"/>
  <text x="122" y="32" font-family="'Courier New',monospace" font-size="10" fill="#8b949e" text-anchor="middle" letter-spacing="2">LOCAL CLOCK · IST</text>
  <!-- Clock face background -->
  <circle cx="55" cy="65" r="28" fill="#0d1117" stroke="#21262d" stroke-width="1.5"/>
  <!-- Clock tick marks -->
  <line x1="55" y1="39" x2="55" y2="44" stroke="#30363d" stroke-width="1.5"/>
  <line x1="55" y1="86" x2="55" y2="91" stroke="#30363d" stroke-width="1.5"/>
  <line x1="28" y1="65" x2="33" y2="65" stroke="#30363d" stroke-width="1.5"/>
  <line x1="77" y1="65" x2="82" y2="65" stroke="#30363d" stroke-width="1.5"/>
  <!-- Hour hand (static at ~10:30 for aesthetics) -->
  <line x1="55" y1="65" x2="46" y2="53" stroke="#58a6ff" stroke-width="2" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" from="0 55 65" to="360 55 65" dur="43200s" repeatCount="indefinite"/>
  </line>
  <!-- Minute hand -->
  <line x1="55" y1="65" x2="55" y2="42" stroke="#e6edf3" stroke-width="1.5" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" from="0 55 65" to="360 55 65" dur="3600s" repeatCount="indefinite"/>
  </line>
  <!-- Second hand -->
  <line x1="55" y1="70" x2="55" y2="40" stroke="#f78166" stroke-width="1" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" from="0 55 65" to="360 55 65" dur="60s" repeatCount="indefinite"/>
  </line>
  <!-- Center dot -->
  <circle cx="55" cy="65" r="3" fill="#58a6ff"/>

  <!-- Digital time label -->
  <text x="155" y="58" font-family="'Courier New',monospace" font-size="24" fill="#58a6ff" text-anchor="middle" font-weight="bold" filter="url(#glow)">IST+5:30</text>
  <text x="155" y="78" font-family="'Courier New',monospace" font-size="12" fill="#8b949e" text-anchor="middle">UTC+05:30</text>
  <text x="155" y="92" font-family="'Courier New',monospace" font-size="10" fill="#3fb950" text-anchor="middle">Malabar, Kerala</text>

  <!-- Vertical divider 1 -->
  <rect x="244" y="20" width="1" height="70" fill="#21262d"/>

  <!-- Center: Region / Location widget -->
  <text x="360" y="35" font-family="'Courier New',monospace" font-size="10" fill="#8b949e" text-anchor="middle" letter-spacing="2">REGION</text>
  <!-- India flag colors -->
  <rect x="310" y="42" width="100" height="7" fill="#ff9933" rx="2"/>
  <rect x="310" y="49" width="100" height="7" fill="#ffffff"/>
  <rect x="310" y="56" width="100" height="7" fill="#138808" rx="2"/>
  <!-- Ashoka chakra simplified -->
  <circle cx="360" cy="52.5" r="4" fill="none" stroke="#000080" stroke-width="0.8"/>
  <circle cx="360" cy="52.5" r="1" fill="#000080"/>
  <!-- Spokes -->
  <line x1="360" y1="48.5" x2="360" y2="49.5" stroke="#000080" stroke-width="0.5"/>
  <line x1="360" y1="55.5" x2="360" y2="56.5" stroke="#000080" stroke-width="0.5"/>
  <line x1="356" y1="52.5" x2="357" y2="52.5" stroke="#000080" stroke-width="0.5"/>
  <line x1="363" y1="52.5" x2="364" y2="52.5" stroke="#000080" stroke-width="0.5"/>

  <text x="360" y="78" font-family="'Courier New',monospace" font-size="14" fill="#e6edf3" text-anchor="middle">🇮🇳 India</text>
  <text x="360" y="96" font-family="'Courier New',monospace" font-size="10" fill="#8b949e" text-anchor="middle">Kerala · Malabar Coast</text>

  <!-- Vertical divider 2 -->
  <rect x="476" y="20" width="1" height="70" fill="#21262d"/>

  <!-- Right: Date widget -->
  <text x="598" y="35" font-family="'Courier New',monospace" font-size="10" fill="#8b949e" text-anchor="middle" letter-spacing="2">DATE &amp; SEASON</text>
  <!-- Calendar icon -->
  <rect x="555" y="42" width="40" height="36" fill="#161b22" rx="4" stroke="#30363d" stroke-width="1"/>
  <rect x="555" y="42" width="40" height="10" fill="#f78166" rx="4"/>
  <rect x="555" y="52" width="40" height="4" fill="#f78166"/>
  <!-- Calendar grid dots -->
  <circle cx="565" cy="62" r="2" fill="#8b949e"/>
  <circle cx="575" cy="62" r="2" fill="#8b949e"/>
  <circle cx="585" cy="62" r="2" fill="#58a6ff"/>
  <circle cx="565" cy="70" r="2" fill="#8b949e"/>
  <circle cx="575" cy="70" r="2" fill="#3fb950" filter="url(#glow)"/>
  <circle cx="585" cy="70" r="2" fill="#8b949e"/>
  <!-- Text beside -->
  <text x="637" y="58" font-family="'Courier New',monospace" font-size="11" fill="#e6edf3" text-anchor="middle">2026</text>
  <text x="637" y="73" font-family="'Courier New',monospace" font-size="11" fill="#58a6ff" text-anchor="middle">☀️ Hot</text>
  <text x="598" y="93" font-family="'Courier New',monospace" font-size="10" fill="#3fb950" text-anchor="middle">Kerala Monsoon Season 🌧️</text>

  <!-- Bottom accent line -->
  <rect x="20" y="104" width="680" height="1" fill="url(#divider)"/>
</svg>
