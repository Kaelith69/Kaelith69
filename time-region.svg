<svg width="720" height="110" viewBox="0 0 720 110" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="divider" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3fb950" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3fb950" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="720" height="110" fill="#0d1117" rx="10"/>
  <rect width="720" height="110" fill="none" stroke="#21262d" stroke-width="1" rx="10"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="720" height="32" fill="#161b22" rx="10"/>
  <rect x="0" y="22" width="720" height="10" fill="#161b22"/>
  <circle cx="20" cy="16" r="5" fill="#f78166"/>
  <circle cx="36" cy="16" r="5" fill="#ffa657"/>
  <circle cx="52" cy="16" r="5" fill="#3fb950"/>
  <text x="360" y="21" font-family="'Courier New',monospace" font-size="11" fill="#8b949e" text-anchor="middle" letter-spacing="2">DATE + TIME ZONE</text>

  <!-- Calendar icon -->
  <rect x="120" y="44" width="44" height="38" fill="#161b22" rx="4" stroke="#30363d" stroke-width="1"/>
  <rect x="120" y="44" width="44" height="10" fill="#f78166" rx="4"/>
  <rect x="120" y="54" width="44" height="4" fill="#f78166"/>
  <circle cx="130" cy="64" r="2" fill="#8b949e"/>
  <circle cx="142" cy="64" r="2" fill="#8b949e"/>
  <circle cx="154" cy="64" r="2" fill="#58a6ff"/>
  <circle cx="130" cy="74" r="2" fill="#8b949e"/>
  <circle cx="142" cy="74" r="2" fill="#3fb950" filter="url(#glow)"/>
  <circle cx="154" cy="74" r="2" fill="#8b949e"/>

  <!-- Date + timezone text -->
  <text id="date-text" x="400" y="65" font-family="'Courier New',monospace" font-size="22" fill="#e6edf3" text-anchor="middle" font-weight="bold">25 FEB 2026</text>
  <text id="tz-text" x="400" y="85" font-family="'Courier New',monospace" font-size="12" fill="#58a6ff" text-anchor="middle">IST · UTC+05:30</text>

  <!-- Bottom accent line -->
  <rect x="20" y="104" width="680" height="1" fill="url(#divider)"/>
</svg>
